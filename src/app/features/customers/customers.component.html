<div class="page-header">
  <h2>Customers</h2>
  <div class="header-actions">
    <button mat-stroked-button *ngIf="hasActiveFilters" (click)="clearFilters()">
      <mat-icon>filter_alt_off</mat-icon> Clear Filters
    </button>
    <button mat-raised-button color="primary" (click)="openDialog()">
      <mat-icon>person_add</mat-icon> Add Customer
    </button>
  </div>
</div>

<!-- ── Mini Stats ──────────────────────────────────────────────────────────── -->
<div class="page-stats" *ngIf="stats">
  <div class="stat-pill pill-primary">
    <mat-icon class="pill-icon">people</mat-icon>
    <div class="pill-body"><span class="pill-value">{{ stats.total }}</span><span class="pill-label">Total Customers</span></div>
  </div>
</div>

<mat-card class="card">
  <div *ngIf="loading" style="display:flex;justify-content:center;padding:48px"><mat-spinner diameter="40"></mat-spinner></div>

  <div class="table-wrap" *ngIf="!loading" [formGroup]="filters">
    <table mat-table [dataSource]="dataSource" class="full-width">

      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef class="col-th name-th">
          <div class="filter-sort-row">
            <mat-form-field class="filter-field" appearance="outline" subscriptSizing="dynamic">
              <input matInput formControlName="name" placeholder="Name">
            </mat-form-field>
            <button mat-icon-button class="sort-btn" (click)="sortBy('name')" matTooltip="Sort">
              <mat-icon [class.sort-active]="sortCol==='name'">{{ sortIcon('name') }}</mat-icon>
            </button>
          </div>
        </th>
        <td mat-cell *matCellDef="let c"><strong>{{ c.name }}</strong></td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef class="col-th">
          <div class="filter-sort-row">
            <mat-form-field class="filter-field" appearance="outline" subscriptSizing="dynamic">
              <input matInput formControlName="email" placeholder="Email">
            </mat-form-field>
            <button mat-icon-button class="sort-btn" (click)="sortBy('email')" matTooltip="Sort">
              <mat-icon [class.sort-active]="sortCol==='email'">{{ sortIcon('email') }}</mat-icon>
            </button>
          </div>
        </th>
        <td mat-cell *matCellDef="let c">{{ c.email || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="phone">
        <th mat-header-cell *matHeaderCellDef class="col-th phone-th">
          <div class="filter-sort-row">
            <mat-form-field class="filter-field" appearance="outline" subscriptSizing="dynamic">
              <input matInput formControlName="phone" placeholder="Phone">
            </mat-form-field>
            <button mat-icon-button class="sort-btn" (click)="sortBy('phone')" matTooltip="Sort">
              <mat-icon [class.sort-active]="sortCol==='phone'">{{ sortIcon('phone') }}</mat-icon>
            </button>
          </div>
        </th>
        <td mat-cell *matCellDef="let c">{{ c.phone || '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="rewardPoints">
        <th mat-header-cell *matHeaderCellDef class="col-th">Points</th>
        <td mat-cell *matCellDef="let c">{{ c.rewardPoints ?? 0 }}</td>
      </ng-container>

      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef class="col-th date-th">
          <div class="filter-sort-row">
            <mat-form-field class="filter-field" appearance="outline" subscriptSizing="dynamic">
              <input matInput formControlName="createdAt" placeholder="Joined">
            </mat-form-field>
            <button mat-icon-button class="sort-btn" (click)="sortBy('createdAt')" matTooltip="Sort">
              <mat-icon [class.sort-active]="sortCol==='createdAt'">{{ sortIcon('createdAt') }}</mat-icon>
            </button>
          </div>
        </th>
        <td mat-cell *matCellDef="let c">{{ c.createdAt | date:'mediumDate' }}</td>
      </ng-container>

      <ng-container matColumnDef="updatedAt">
        <th mat-header-cell *matHeaderCellDef class="col-th date-th">
          <div class="filter-sort-row">
            <mat-form-field class="filter-field" appearance="outline" subscriptSizing="dynamic">
              <input matInput formControlName="updatedAt" placeholder="Last Updated">
            </mat-form-field>
            <button mat-icon-button class="sort-btn" (click)="sortBy('updatedAt')" matTooltip="Sort">
              <mat-icon [class.sort-active]="sortCol==='updatedAt'">{{ sortIcon('updatedAt') }}</mat-icon>
            </button>
          </div>
        </th>
        <td mat-cell *matCellDef="let c">{{ c.updatedAt ? (c.updatedAt | date:'short') : '—' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef class="col-th actions-th">Actions</th>
        <td mat-cell *matCellDef="let c" class="actions-cell">
          <button mat-icon-button (click)="openMemberCard(c)" matTooltip="{{ c.memberCardBarcode ? 'View card' : 'Create card' }}"><mat-icon>badge</mat-icon></button>
          <button mat-icon-button (click)="viewOrders(c)" matTooltip="View Orders" color="primary"><mat-icon>receipt_long</mat-icon></button>
          <button mat-icon-button (click)="openDialog(c)" matTooltip="Edit"><mat-icon>edit</mat-icon></button>
          <button mat-icon-button color="warn" *ngIf="isAdminOrManager" (click)="delete(c)" matTooltip="Delete"><mat-icon>delete</mat-icon></button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="data-row"></tr>
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell text-center" [attr.colspan]="displayedColumns.length" style="padding:32px">No customers found.</td>
      </tr>
    </table>
  </div>
  <mat-paginator [length]="totalElements" [pageSize]="pageSize" [pageSizeOptions]="[10,20,50]"
    (page)="onPage($event)" showFirstLastButtons></mat-paginator>
</mat-card>
